version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://agri_user:agri_pass_2026@postgres:5432/agri_ai_db
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:15-alpine
    container_name: agri_postgres
    environment:
      POSTGRES_USER: agri_user
      POSTGRES_PASSWORD: agri_pass_2026
      POSTGRES_DB: agri_ai_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/database/schema.sql:/docker-entrypoint-initdb.d/schema.sql

  redis:
    image: redis:7-alpine
    container_name: agri_redis
    ports:
      - "6379:6379"

volumes:
  pgdata:
